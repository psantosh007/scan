services:
  - type: web
    name: cherry-rewards
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn cherry_backend:app
    envVars:
      - key: MQTT_BROKER
        value: broker.hivemq.com
      - key: MQTT_PORT
        value: "1883"
      - key: MQTT_USER
        value: ""
      - key: MQTT_PASS
        value: ""
      - key: MQTT_CLIENT_ID
        value: cherry_backend_prod
      - key: DATABASE_URL
        fromDatabase:
          name: cherry-rewards-db
          property: connectionString

databases:
  - name: cherry-rewards-db
    databaseName: cherry_rewards
    plan: free
